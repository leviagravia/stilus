<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Stilus official icon candidate</title>
  <desc id="desc">A true vector SVG icon of an ancient Roman stylus engraving wax-tablet lines. No embedded raster image.</desc>

  <defs>
    <linearGradient id="bronze" x1="150" y1="420" x2="390" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7a470c"/>
      <stop offset="0.45" stop-color="#b8791c"/>
      <stop offset="0.72" stop-color="#d49a34"/>
      <stop offset="1" stop-color="#8c560f"/>
    </linearGradient>
    <linearGradient id="bronzeLight" x1="175" y1="380" x2="350" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dca44a" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffe0a0" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="#ffffff"/>

  <!-- Wax tablet incision lines -->
  <g fill="none" stroke="#a66a19" stroke-linecap="round">
    <path d="M130 405 H378" stroke-width="14"/>
    <path d="M202 350 H378" stroke-width="12"/>
    <path d="M248 300 H378" stroke-width="10"/>
  </g>

  <!-- Ancient Roman stylus: one continuous, aligned axis -->
  <g transform="rotate(-45 256 256)" stroke="#70420a" stroke-linejoin="round">
    <!-- pointed engraving tip -->
    <path d="M236 430 L256 482 L276 430 Z" fill="url(#bronze)" stroke-width="7"/>

    <!-- ferrule, joined to shaft -->
    <path d="M232 382 L280 382 L274 430 L238 430 Z" fill="#9b6115" stroke-width="7"/>

    <!-- main shaft -->
    <path d="M226 150 L286 150 L280 382 L232 382 Z" fill="url(#bronze)" stroke-width="7"/>

    <!-- central highlight, same axis -->
    <path d="M247 170 L244 360" fill="none" stroke="url(#bronzeLight)" stroke-width="9" stroke-linecap="round"/>

    <!-- integrated grip rings -->
    <g fill="url(#bronze)" stroke-width="6">
      <rect x="218" y="118" width="76" height="22" rx="11"/>
      <rect x="218" y="94" width="76" height="22" rx="11"/>
      <rect x="218" y="70" width="76" height="22" rx="11"/>
    </g>

    <!-- neck and round terminal -->
    <path d="M242 44 H270 V70 H242 Z" fill="#9b6115" stroke-width="6"/>
    <circle cx="256" cy="24" r="34" fill="url(#bronze)" stroke-width="7"/>
    <circle cx="244" cy="12" r="10" fill="#ffe2a0" stroke="none" opacity="0.75"/>
  </g>
</svg>
